<!DOCTYPE html> 
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Registration</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #23242a;
            height: 100vh;
        }

        .box {
            position: relative;
            width: 370px;
            height: 500px;
            background: #1c1c1c;
            border-radius: 50px 5px;
            overflow: hidden;
        }

        .box::before,
        .box::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 370px;
            height: 500px;
            background: linear-gradient(60deg, transparent, #45f3ff, #45f3ff);
            transform-origin: bottom right;
            animation: animate 6s linear infinite;
        }

        .box::after {
            background: linear-gradient(60deg, transparent, #d9138a, #d9138a);
            animation-delay: -3s;
        }

        @keyframes animate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        form {
            position: absolute;
            inset: 2px;
            background: #28292d;
            border-radius: 50px 5px;
            z-index: 10;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .title h1 {
            color: #45f3ff;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        form .input-box {
            width: 100%;
            margin-top: 15px;
        }

        form .input-box input {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            outline: none;
            border-radius: 15px;
            padding: 10px 20px;
            font-size: 1rem;
            margin: 10px 0;
            color: white;
        }

        form .submit {
            width: 100%;
            background-color: #45f3ff;
            border: none;
            padding: 10px;
            color: #28292d;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 15px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 20px;
        }

        form .submit:hover {
            background-color: #d9138a;
        }

        form .link-text {
            padding-top: 10px;
            color: rgb(103, 173, 183);
            font-size: 0.85rem;
            text-align: center;
        }

        form .link-text a {
            text-decoration: none;
            color: rgb(153, 41, 99);
            font-weight: 700;
        }

        .label-color {
            color: #9eb3b5;
        }

        /* Media Queries for smaller screens */
        @media (max-width: 768px) {
            .box {
                width: 90%;
                height: auto;
            }

            form {
                padding: 20px;
            }

            .title h1 {
                font-size: 1.5rem;
            }

            form .submit {
                font-size: 1rem;
            }

            form .input-box input {
                padding: 8px 15px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .box {
                width: 95%;
                height: auto;
            }

            .title h1 {
                font-size: 1.3rem;
            }

            form .input-box input {
                font-size: 0.8rem;
                padding: 8px 10px;
            }

            form .submit {
                font-size: 0.9rem;
                padding: 8px;
            }

            form .link-text {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="box">
        <form method="POST" action="/admin_register">
            {% csrf_token %}
            <div class="title">
                <h1>Admin Registration</h1>
            </div>
            <div class="input-box">
                <label for="username" class="label-color">Username</label>
                <input type="text" id="username" name="username" placeholder="Username" required autofocus />
            </div>
            <div class="input-box">
                <label for="password" class="label-color">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required />
            </div>
            <div class="input-box">
                <label for="password2" class="label-color">Confirm Password</label>
                <input type="password" id="password2" name="password2" placeholder="Confirm Password" required />
            </div>
            <input type="submit" class="submit" value="Register" />
            <p class="link-text">&copy; StudentPortal</p>
        </form>
    </div>
</body>

</html>
