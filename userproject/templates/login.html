{% load static %}
<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Login Page - Student and College Management System</title>
    <style>
        /* Reset and Base Styles */
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }
        body {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url({% static 'aboutbg.gif' %});
            position: relative;
            overflow: hidden;
        }
        .container-animated {
            position: absolute;
            width: 256px;
            height: 256px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: -1;
        }
        .container-animated span {
            position: absolute;
            left: 0;
            width: 20px;
            height: 8px;
            background: #2c4766;
            border-radius: 20rem;
            transform-origin: 128px;
            transform: scale(2.2) rotate(calc(var(--i) * (360deg / 50)));
            animation: animate 3s linear infinite;
            animation-delay: calc(var(--i) * (3s / 50));
        }

        @keyframes animate {
            0% {
                background: #0ef;
            }

            25% {
                background: #2c4766;
            }
            100% {
                background: #0ef;
            }
        }

        /* Login Box Styles */


        .login-box h1 {
            font-size: 2em;
            color: #0ef;
            text-align: center;
            margin-bottom: 20px;
        }

        .input-box {
            position: relative;
            margin: 20px 0;
        }

        .input-box input {
            width: 100%;
            height: 50px;
            background: transparent;
            border: 2px solid #2c4766;
            outline: none;
            border-radius: 40px;
            font-size: 1em;
            color: #fff;
            padding: 0 20px;
            transition: 0.5s ease;
        }

        .input-box input:focus {
            border-color: #0ef;
        }

        .input-box label {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            font-size: 1em;
            pointer-events: none;
            transition: 0.5s ease;
            color: rgb(132, 187, 192);
        }

        .input-box input:focus ~ label,
        .input-box input:valid ~ label {
            top: 1px;
            font-size: 0.8em;
            background: #1f293d;
            padding: 0 6px;
            color: #0ef;
        }

        .btn-submit {
            cursor: pointer;
            width: 100%;
            font-size: 1.2em;
            color: #0ef;
            background: #1f293d;
            text-decoration: none;
            text-transform: uppercase;
            border: 2px solid #0ef;
            border-radius: 30px;
            padding: 10px 0;
            overflow: hidden;
            transition: color 1s, box-shadow 1s;
            margin-bottom: 10px;
        }

        .btn-submit:hover {
            color: white;
            box-shadow: 0 0 10px #0ef, 0 0 20px #0ef, 0 0 40px #0ef, 0 0 80px #0ef, 0 0 160px #0ef;
        }

        .link-text {
            margin: 15px 0;
            color: rgb(236, 240, 241);
            font-size: 0.85rem;
            text-align: center;
        }

        .link-text a {
            text-decoration: none;
            color: rgb(120, 184, 215);
            font-weight: 700;
        }
        .link-text a:hover {
            text-decoration: underline;
        }
        /* Footer Styles */
        .p3 {
            font-size: 1rem;
            color: rgb(5, 17, 248);
            text-align: center;
            margin-top: 20px;
        }

        /* Responsive Adjustments */
        @media (max-width: 576px) {
            .login-box {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="container-animated">
        <!-- Adjust the number of spans as needed -->
        <span style="--i:0;"></span>
        <span style="--i:1;"></span>
        <span style="--i:2;"></span>
        <span style="--i:3;"></span>
        <span style="--i:4;"></span>
        <span style="--i:5;"></span>
        <span style="--i:6;"></span>
        <span style="--i:7;"></span>
        <span style="--i:8;"></span>
        <span style="--i:9;"></span>
        <span style="--i:10;"></span>
        <span style="--i:11;"></span>
        <span style="--i:12;"></span>
        <span style="--i:13;"></span>
        <span style="--i:14;"></span>
        <span style="--i:15;"></span>
        <span style="--i:16;"></span>
        <span style="--i:17;"></span>
        <span style="--i:18;"></span>
        <span style="--i:19;"></span>
        <span style="--i:20;"></span>
        <span style="--i:21;"></span>
        <span style="--i:22;"></span>
        <span style="--i:23;"></span>
        <span style="--i:24;"></span>
        <span style="--i:25;"></span>
        <span style="--i:26;"></span>
        <span style="--i:27;"></span>
        <span style="--i:28;"></span>
        <span style="--i:29;"></span>
        <span style="--i:30;"></span>
        <span style="--i:31;"></span>
        <span style="--i:32;"></span>
        <span style="--i:33;"></span>
        <span style="--i:34;"></span>
        <span style="--i:35;"></span>
        <span style="--i:36;"></span>
        <span style="--i:37;"></span>
        <span style="--i:38;"></span>
        <span style="--i:39;"></span>
        <span style="--i:40;"></span>
        <span style="--i:41;"></span>
        <span style="--i:42;"></span>
        <span style="--i:43;"></span>
        <span style="--i:44;"></span>
        <span style="--i:45;"></span>
        <span style="--i:46;"></span>
        <span style="--i:47;"></span>
        <span style="--i:48;"></span>
        <span style="--i:49;"></span>
    </div>
    <!-- Login Form -->
    <div class="login-box">
        <h1>Please Sign In</h1>
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="input-box">
                <input type="text" id="username" name="username" required>
                <label for="username">Username</label>
            </div>
            <div class="input-box">
                <input type="password" id="password" name="password" required>
                <label for="password">Password</label>
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
            <p class="link-text">
                New User?
                <a href="{% url 'register' %}">Click Here</a>
            </p>
            <p class="link-text">
                Register as Admin?
                <a href="{% url 'admin_register' %}">Click Here</a>
            </p>
            <p class="link-text">
                <a href="{% url 'home1' %}">Back to Home</a>
            </p>
        </form>
        <p class="p3">&copy; Student Management Portal</p>
    </div>
</body>
</html>
